<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCRideshare - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="left">UCRide</div>
        <div class="right">
            <a href="/signin.html"><button class="button-light">Sign In</button></a>
            <a href="/register.html"><button class="button-dark">Register</button></a>
        </div>
    </nav>

    <div class="register-page">
        <div class="register-card">
            <div class="card-header">
            <div class="card-brand">UCRide</div>
            <div class="card-title">Create an account</div>
            <div class="card-subtitle">Already a member? <a href="/signin.html">Sign in</a></div>
            </div>

            <form action="/register" method="POST">
            <div class="form-row">
                <div class="field">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Jane" required autocomplete="given-name">
                </div>
                <div class="field">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Doe" required autocomplete="family-name">
                </div>
            </div>

            <div class="field">
                <label for="email">UCR Email</label>
                <input type="email" id="email" name="email" placeholder="jdoe012@ucr.edu" required autocomplete="username">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div>
                <div class="role-label">I want to:</div>
                <div class="select-role">
                <div class="role-option">
                    <input type="radio" id="driver" name="role" value="driver">
                    <label for="driver">
                    <span class="role-icon"></span>
                    Offer Rides
                    </label>
                </div>
                <div class="role-option">
                    <input type="radio" id="rider" name="role" value="rider">
                    <label for="rider">
                    <span class="role-icon"></span>
                    Find Rides
                    </label>
                </div>
                </div>
            </div>

            <button type="submit" class="button-dark submit-btn">Create Account</button>
            </form>
        </div>
    </div>

</body>
</html>
