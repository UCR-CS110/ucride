<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCRideshare - Sign In</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="left">UCRide</div>
        <div class="right">
            <a href="/signin.html"><button class="button-light">Sign In</button></a>
            <a href="/register.html"><button class="button-dark">Register</button></a>
        </div>
    </nav>

    <div class="signin-page">
        <div class="signin-card">
            <div class="card-header">
            <div class="card-brand">UCRide</div>
            <div class="card-title">Welcome Back</div>
            <div class="card-subtitle">New to UCRide? <a href="/register.html">Register</a></div>
            </div>

            <form action="/signin" method="POST">
                <div class="field">
                    <label for="email">UCR Email</label>
                    <input type="email" id="email" name="email" placeholder="jdoe012@ucr.edu" required autocomplete="username">
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="button-dark submit-btn">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
