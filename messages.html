<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCRideshare - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="left">UCRide</div>
        <div class="right">
            <span class="user-fname">Drake</span>
            <a href="/index.html"><button class="button-dark">Sign Out</button></a>
        </div>
    </nav>

    <div class="messages-page">
        <div class="container-left">
            <h1>Messages</h1>
            <search>
                <input type="search" id="site-search" name="q" placeholder="Search conversations...">
            </search>
            <div class="directmessage-container">
                <div class="directmessage active">
                    <div class="avatar">SJ</div>
                    <div class="right">
                        <div class="top">
                            <span class="profile-name">Sarah Jade</span>
                            <span class="time-of-message">10:24AM</span>
                        </div>
                        <div class="bottom">Thanks for the ride!</div>
                    </div>
                </div>
                <div class="directmessage">
                    <div class="avatar">MC</div>
                    <div class="right">
                        <div class="top">
                            <span class="profile-name">Mike Chen</span>
                            <span class="time-of-message">6:32PM</span>
                        </div>
                        <div class="bottom">What time are...</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container-right">
            <div class="banner">
                <div class="avatar">SJ</div>
                <div>
                    <span class="profile-name">Sarah Jade</span>
                    <span class="activity-status">Active now</span>
                </div>
            </div>
            <div class="messages-container">
                <div class="received-message">
                    Hi, I'm going to be 5 minutes late to pick you up. Sorry! 
                </div>
                <div class="sent-message">
                    Okay
                </div>
                <div class="received-message">👍</div>
            </div>
            <div class="message-input-bar">
                <input type="text" placeholder="Type a message...">
                <button class="send-btn"><img src="./icons/send.png" alt="Send" class="icon-xlarge white"></button>
            </div>
        </div>
    </div>

</body>
</html>
